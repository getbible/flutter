name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Validate Dart formatting and parsing
        run: dart format --output=none .
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release --base-href /flutter/
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: getBible-live-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: getBible-live-web
          path: build/web
